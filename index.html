<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>렉스김어학원 시험 예약</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --p-color: #0056b3; --bg: #f4f7f9; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; line-height: 1.5; color: #333; }
        .container { max-width: 550px; margin: 20px auto; background: white; padding: 30px 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); position: relative; }
        
        /* 상단 안내 */
        .header-area { text-align: center; margin-bottom: 25px; }
        .header-area h2 { font-size: 1.6rem; color: #111; margin-bottom: 12px; }
        .header-area p { font-size: 1rem; color: #555; background: #fdf2f2; padding: 15px; border-radius: 10px; border-left: 5px solid #e74c3c; text-align: left; white-space: pre-wrap; }

        /* 기간 안내 */
        .period-info { background: #eee; padding: 12px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 15px; text-align: center; font-weight: bold; color: #444; border: 1px solid #ddd; }
        .period-active { color: #0056b3; border: 1px solid #0056b3; background: #f0f7ff; }

        /* 회차 리스트 */
        .session-list { display: grid; gap: 10px; margin-bottom: 20px; }
        .session-item { border: 1px solid #e1e4e8; padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.2s; background: #fff; }
        .session-item.disabled { opacity: 0.4; cursor: not-allowed; }
        .session-item.selected { border: 2px solid var(--p-color); background: #f0f7ff; box-shadow: 0 4px 10px rgba(0,86,179,0.1); }
        .rem-tag { float: right; font-weight: bold; color: #e74c3c; }

        /* 정보 입력부 안내 문구 */
        .input-group { margin-top: 25px; padding: 20px; border: 1px dashed #ccc; border-radius: 12px; background: #fafafa; }
        .info-notice { background: #fff9db; color: #856404; padding: 12px; border-radius: 6px; font-size: 0.95rem; margin-bottom: 15px; border: 1px solid #ffeeba; font-weight: bold; text-align: center; }

        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 16px; background: var(--p-color); color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        
        /* 관리자 모드 스타일 보강 */
        #adminSection { display: none; margin-top: 10px; }
        .admin-nav { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        .admin-box { background: #f8f9fa; padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #e0e0e0; }
        .admin-box strong { display: block; margin-bottom: 10px; font-size: 1rem; color: #111; }
        
        /* 안내 문구 수정 행 스타일 */
        .notice-row { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; background: #fff; padding: 8px; border-radius: 8px; border: 1px solid #eee; }
        .notice-row input[type="radio"] { width: 20px; height: 20px; cursor: pointer; margin: 0; }
        .notice-row input[type="text"] { flex: 1; padding: 12px; font-size: 1rem; border: 1px solid #ccc; margin: 0; }
        .notice-row input[type="text"]:focus { border-color: var(--p-color); outline: none; background: #fff; }
        .btn-del { color: #e74c3c; border: 1px solid #e74c3c; background: #fff; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .btn-del:hover { background: #fff5f5; }
        .btn-add { background: #eee; border: 1px solid #ccc; padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; color: #555; margin-top: 5px; }

        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 15px; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: center; }
        
        .admin-link { text-align: center; margin-top: 40px; }
        .admin-link button { background: none; border: none; color: #aaa; text-decoration: underline; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <div id="userSection">
        <div class="header-area">
            <h2 id="viewTitle">렉스김어학원 시험 안내</h2>
            <p id="viewDesc"></p>
        </div>

        <div id="periodDisplay" class="period-info">예약 기간 확인 중...</div>

        <h3>1. 회차 선택</h3>
        <div id="sessionList" class="session-list"></div>
        
        <div id="inputForm" class="input-group" style="display:none;">
            <div id="viewNotice" class="info-notice"></div>
            <h3>2. 정보 입력</h3>
            <input type="text" id="inName" placeholder="학생 이름 (한글 입력)" oninput="this.value = this.value.replace(/[^ㄱ-ㅎ|ㅏ-ㅣ|가-힣]/g, '')">
            <input type="text" id="inPhone" placeholder="학부모님 연락처" maxlength="13" oninput="autoHyphen(this)">
            <button class="btn-main" onclick="doReserve()">예약 신청 완료</button>
        </div>

        <div class="admin-link"><button onclick="checkAuth()">[ 관리자 설정 ]</button></div>
    </div>

    <div id="adminSection">
        <div class="admin-nav">
            <button onclick="goHome()" style="padding: 8px 12px; cursor: pointer; border-radius: 6px; border: 1px solid #ccc; background: #fff;">🏠 메인 화면으로</button>
            <strong style="font-size: 1.1rem;">시스템 관리</strong>
        </div>

        <div class="admin-box">
            <strong>기본 및 기간 설정</strong>
            <input type="text" id="edTitle" placeholder="제목">
            <textarea id="edDesc" rows="2" style="width:100%; margin-bottom:10px; font-family: inherit; padding: 10px; border-radius: 8px; border: 1px solid #ddd;"></textarea>
            시작: <input type="datetime-local" id="edStart" style="margin-bottom:8px; padding:10px;"><br>
            종료: <input type="datetime-local" id="edEnd" style="padding:10px;">
        </div>

        <div class="admin-box">
            <strong>안내 문구 관리 (선택한 문구가 메인에 표시됩니다)</strong>
            <div id="edNotices"></div>
            <button class="btn-add" onclick="addNoticeRow()">+ 새로운 안내 문구 추가</button>
        </div>

        <div class="admin-box">
            <strong>회차 관리</strong>
            <div id="edSessions"></div>
            <button class="btn-add" onclick="addSessionRow()">+ 새로운 회차 추가</button>
        </div>
        
        <button class="btn-main" style="background:#333; margin-top: 10px;" onclick="saveAdminSettings()">모든 설정 저장 및 적용</button>

        <div style="margin-top:30px; background: #fff; padding: 15px; border-radius: 12px; border: 1px solid #eee;">
            <strong>📋 신청 명단 현황</strong>
            <div style="margin:10px 0; display: flex; gap: 10px;">
                <button onclick="downloadExcel()" style="flex:1; padding:10px; background: #217346; color: white; border: none; border-radius: 6px; cursor: pointer;">엑셀 저장</button> 
                <button onclick="clearAllData()" style="flex:1; padding:10px; background: #fff; color: #e74c3c; border: 1px solid #e74c3c; border-radius: 6px; cursor: pointer;">전체 삭제</button>
            </div>
            <table><thead><tr><th>회차</th><th>이름</th><th>번호</th><th>삭제</th></tr></thead><tbody id="resTable"></tbody></table>
        </div>
    </div>
</div>

<script>
const firebaseConfig = { databaseURL: "https://reservation-lex-default-rtdb.asia-southeast1.firebasedatabase.app/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const defaultNotices = ["설명회 들은 학생만 신청 가능", "쌍둥이는 따로 입력"];
let configData = { title: "렉스김어학원 시험 안내", desc: "", sessions: [], start: "", end: "", notices: defaultNotices, selectedNoticeIdx: 1 };
let reserveLogs = {};
let selectedIdx = null;

db.ref('master').on('value', (snap) => {
    const data = snap.val();
    if(data) {
        configData = data;
        if(!configData.notices) configData.notices = defaultNot
