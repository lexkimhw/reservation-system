<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>렉스김어학원 예약 시스템</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --p-color: #0056b3; --bg: #f4f7f9; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 10px; line-height: 1.5; color: #333; }
        .container { max-width: 550px; margin: 20px auto; background: white; padding: 30px 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .header-area { text-align: center; margin-bottom: 25px; }
        .header-area h2 { font-size: 1.6rem; color: #111; margin-bottom: 12px; }
        .header-area p { font-size: 1rem; color: #555; background: #fdf2f2; padding: 15px; border-radius: 10px; border-left: 5px solid #e74c3c; text-align: left; white-space: pre-wrap; }
        .period-info { background: #eee; padding: 12px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 15px; text-align: center; font-weight: bold; color: #444; border: 1px solid #ddd; }
        .period-active { color: #0056b3; border: 1px solid #0056b3; background: #f0f7ff; }
        .session-list { display: grid; gap: 10px; margin-bottom: 20px; }
        .session-item { border: 1px solid #e1e4e8; padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.2s; background: #fff; position: relative; }
        .session-item.disabled { opacity: 0.5; cursor: not-allowed; background: #f9f9f9; }
        .session-item.selected { border: 2px solid var(--p-color); background: #f0f7ff; box-shadow: 0 4px 10px rgba(0,86,179,0.1); }
        .rem-tag { float: right; font-weight: bold; color: #e74c3c; }
        input, textarea, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; box-sizing: border-box; font-family: inherit; }
        .btn-main { width: 100%; padding: 16px; background: var(--p-color); color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-main:disabled { background: #ccc; cursor: not-allowed; }
        
        .input-header { display: flex; flex-direction: column; align-items: flex-start; gap: 5px; margin-bottom: 10px; }
        .input-header h3 { margin: 0; }
        .sub-desc { font-size: 0.8rem; color: #777; font-weight: normal; line-height: 1.4; }
        .warning-text { font-size: 0.85rem; color: #e74c3c; margin-top: 5px; font-weight: bold; }

        #adminSection { display: none; margin-top: 10px; }
        .admin-nav { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        .admin-box { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #eee; }
        .admin-row { display: flex; gap: 5px; margin-bottom: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: center; }
        .list-ctrl { display: flex; justify-content: space-between; align-items: center; margin-top: 25px; margin-bottom: 10px; }
        .btn-excel { padding: 8px 12px; background: #217346; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
        .btn-clear { padding: 8px 12px; background: #fff; color: #e74c3c; border: 1px solid #e74c3c; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
        .admin-link { text-align: center; margin-top: 40px; }
        .admin-link button { background: none; border: none; color: #aaa; text-decoration: underline; cursor: pointer; font-size: 0.8rem; }
        .temp-ctrl { display: flex; gap: 5px; margin-bottom: 5px; }
        .btn-temp { flex: 1; padding: 8px; font-size: 0.8rem; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="userSection">
        <div class="header-area">
            <h2 id="viewTitle">로딩 중...</h2>
            <p id="viewDesc"></p>
        </div>
        <div id="periodDisplay" class="period-info">기간 확인 중...</div>
        
        <h3>1. 회차 선택</h3>
        <div id="sessionList" class="session-list"></div>
        
        <div id="inputForm" style="display:none;">
            <div class="input-header">
                <h3>2. 정보 입력</h3>
                <span class="sub-desc">학부모 연락처는 학원에 전화하여 설명회 예약시 말한 연락처입니다.<br>연락처 변경시 010-4967-7807로 문자 부탁 드립니다.</span>
            </div>
            
            <input type="text" id="inName" placeholder="학생 이름" lang="ko" oninput="validateName(this)">
            <input type="text" id="inPhone" placeholder="학부모님 연락처" maxlength="13" oninput="autoHyphen(this)">
            
            <!-- 설명회 전용 선택란 -->
            <div id="briefingOnly" style="display:none;">
                <select id="inAttendee">
                    <option value="">-- 설명회 참석자 선택 --</option>
                    <option value="아버님">아버님</option>
                    <option value="어머님">어머님</option>
                    <option value="두분 모두">두분 모두</option>
                </select>
                <div class="warning-text">※ 부모님을 대신하여 할아버지, 할머니, 이모, 고모, 아는 지인 참석은 안됩니다.</div>
            </div>

            <button class="btn-main" id="submitBtn" onclick="doReserve()">예약 신청 완료</button>
        </div>
        
        <div class="admin-link"><button onclick="checkAuth()">[ 관리자 설정 ]</button></div>
    </div>

    <div id="adminSection">
        <div class="admin-nav">
            <button onclick="goHome()">🏠 메인으로</button>
            <strong>관리자 설정</strong>
        </div>
        <div class="admin-box">
            <strong>공지 및 예약 기간 설정</strong>
            <select id="templateSelect" onchange="loadTemplate(this.value)" style="margin-bottom: 5px;">
                <option value="">-- 저장된 템플릿 선택 --</option>
            </select>
            <div class="temp-ctrl">
                <button class="btn-temp" style="background:#e3f2fd;" onclick="saveAsTemplate()">현재 내용 저장</button>
                <button class="btn-temp" style="background:#ffebee; color:#c62828;" onclick="deleteTemplate()">선택 삭제</button>
            </div>
            <input type="text" id="edTitle" placeholder="제목 (설명회 또는 시험 단어 포함 필수)">
            <textarea id="edDesc" rows="3" placeholder="안내 문구 입력"></textarea>
            시작: <input type="datetime-local" id="edStart" style="margin-bottom:5px;"><br>
            종료: <input type="datetime-local" id="edEnd">
        </div>
        <div class="admin-box">
            <strong>회차 및 정원 관리</strong>
            <div id="edSessions"></div>
            <button onclick="addSessionRow()">+ 회차 추가</button>
        </div>
        <button class="btn-main" style="background:#333;" onclick="saveAdminSettings()">설정 저장 및 적용</button>
        <div class="list-ctrl">
            <strong>실시간 예약 명단</strong>
            <div>
                <button class="btn-excel" onclick="downloadExcel()">엑셀 저장</button>
                <button class="btn-clear" onclick="clearAllLogs()">⚠️ 전체 삭제</button>
            </div>
        </div>
        <table>
            <thead><tr><th>회차</th><th>이름</th><th>번호</th><th>참석자</th><th>삭제</th></tr></thead>
            <tbody id="resTable"></tbody>
        </table>
    </div>
</div>

<script>
const firebaseConfig = { 
    databaseURL: "https://lexkimhw-63c3b-default-rtdb.asia-southeast1.firebasedatabase.app/" 
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let configData = { title: "", desc: "", sessions: [], start: "", end: "", templates: {} };
let reserveLogs = {};
let selectedIdx = null;

db.ref('master').on('value', (snap) => {
    const data = snap.val();
    if(data) {
        configData = data;
        const title = data.title || "렉스김어학원 예약";
        document.getElementById('viewTitle').innerText = title;
        document.getElementById('viewDesc').innerText = data.desc || "";
        document.getElementById('edTitle').value = title;
        document.getElementById('edDesc').value = data.desc || "";
        document.getElementById('edStart').value = data.start || "";
        document.getElementById('edEnd').value = data.end || "";
        
        // 제목 키워드에 따른 UI 변경 로직
        const briefingDiv = document.getElementById('briefingOnly');
        const nameInput = document.getElementById('inName');
        
        if(title.includes("설명회")) {
            briefingDiv.style.display = "block";
            nameInput.placeholder = "학생 이름 (한글)";
        } else if(title.includes("시험")) {
            briefingDiv.style.display = "none";
            nameInput.placeholder = "학생 이름 (한글) : 형제, 쌍둥이 각각 따로 입력";
        }

        renderTemplateList(data.templates || {});
        updatePeriodStatus();
        renderUserSessions();
        renderAdminSessions();
    }
});

db.ref('logs').on('value', (snap) => { reserveLogs = snap.val() || {}; renderLogTable(); });

function validateName(obj) {
    // 제목에 '시험'이 포함된 경우에만 숫자/영문 완전 차단 (한글만)
    if(configData.title.includes("시험")) {
        obj.value = obj.value.replace(/[^ㄱ-ㅎ|ㅏ-ㅣ|가-힣]/g, '');
    } else {
        obj.value = obj.value.replace(/[^ㄱ-ㅎ|ㅏ-ㅣ|가-힣|a-z|A-Z|\s]/g, '');
    }
}

function isPeriodActive() {
    if(!configData.start || !configData.end) return true;
    const now = new Date();
    return now >= new Date(configData.start) && now <= new Date(configData.end);
}

function updatePeriodStatus() {
    const el = document.getElementById('periodDisplay');
    if(!isPeriodActive()) {
        el.innerText = "현재 예약 기간이 아닙니다.";
        el.className = "period-info";
        document.getElementById('inputForm').style.display = 'none';
        selectedIdx = null;
    } else {
        const eStr = (configData.end || "").replace('T', ' ');
        el.innerText = `현재 예약 가능 기간 (~ ${eStr})`;
        el.className = "period-info period-active";
    }
}

function renderUserSessions() {
    const div = document.getElementById('sessionList'); 
    div.innerHTML = "";
    const active = isPeriodActive();
    (configData.sessions || []).forEach((s, i) => {
        const isSoldOut = s.cap <= 0;
        const item = document.createElement('div');
        item.className = `session-item ${(!active || isSoldOut) ? 'disabled' : ''} ${selectedIdx === i ? 'selected' : ''}`;
        item.onclick = () => {
            if(!active) return alert("현재 입력 시간이 아닙니다.");
            if(isSoldOut) return alert("해당 회차는 마감되었습니다.");
            selectedIdx = i; 
            renderUserSessions();
            document.getElementById('inputForm').style.display = 'block';
        };
        const statusText = isSoldOut ? "마감" : `잔여 ${s.cap}석`;
        item.innerHTML = `<span class="rem-tag" style="color:${isSoldOut ? '#888':'#e74c3c'}">${statusText}</span><strong>${s.name}</strong>`;
        div.appendChild(item);
    });
}

async function doReserve() {
    const name = document.getElementById('inName').value.trim();
    const phone = document.getElementById('inPhone').value.trim();
    const attendee = document.getElementById('inAttendee').value;
    const isBriefing = configData.title.includes("설명회");
    const btn = document.getElementById('submitBtn');
    
    if(!isPeriodActive()) return alert("기간이 아닙니다.");
    if(!name || !phone || selectedIdx === null) return alert("모든 정보를 입력해주세요.");
    if(isBriefing && !attendee) return alert("설명회 참석자를 선택해주세요.");
    if(!/^010-\d{3,4}-\d{4}$/.test(phone)) return alert("연락처 형식을 확인해주세요.");

    btn.disabled = true;

    let existingLogKey = null;
    let oldSessionIdx = null;
    
    for (const key in reserveLogs) {
        if (reserveLogs[key].student === name && reserveLogs[key].phone === phone) {
            existingLogKey = key;
            oldSessionIdx = reserveLogs[key].sessionIdx;
            break;
        }
    }

    if (existingLogKey && oldSessionIdx === selectedIdx) {
        btn.disabled = false;
        return alert(`이미 같은 정보로 예약되어 있습니다.`);
    }

    const sessionRef = db.ref(`master/sessions/${selectedIdx}`);
    sessionRef.transaction((session) => {
        if (session) {
            if (session.cap <= 0) return;
            session.cap -= 1;
        }
        return session;
    }, async (error, committed) => {
        if (error || !committed) {
            alert("죄송합니다. 예약이 마감되었습니다.");
            btn.disabled = false;
        } else {
            if (existingLogKey && oldSessionIdx !== null) {
                await db.ref(`master/sessions/${oldSessionIdx}/cap`).transaction(c => (c || 0) + 1);
                await db.ref(`logs/${existingLogKey}`).remove();
            }

            db.ref('logs').push({
                date: new Date().toLocaleString('ko-KR'),
                session: configData.sessions[selectedIdx].name,
                sessionIdx: selectedIdx,
                student: name,
                phone: phone,
                attendee: isBriefing ? attendee : "-" // 설명회일 때만 저장
            }).then(() => {
                alert("예약이 완료되었습니다.");
                resetForm();
            });
        }
    });
}

function resetForm() {
    document.getElementById('inName').value = "";
    document.getElementById('inPhone').value = "";
    document.getElementById('inAttendee').value = "";
    document.getElementById('submitBtn').disabled = false;
    selectedIdx = null;
    document.getElementById('inputForm').style.display = 'none';
    renderUserSessions();
}

function autoHyphen(obj) {
    let str = obj.value.replace(/[^0-9]/g, '');
    if (str.length < 4) obj.value = str;
    else if (str.length < 11) obj.value = str.substr(0, 3) + '-' + str.substr(3, 3) + '-' + str.substr(6);
    else obj.value = str.substr(0, 3) + '-' + str.substr(3, 4) + '-' + str.substr(7);
}

function checkAuth() { 
    if(prompt("관리자 암호") === "5556575") { 
        document.getElementById('userSection').style.display='none'; 
        document.getElementById('adminSection').style.display='block'; 
    } 
}

function goHome() { 
    document.getElementById('adminSection').style.display='none'; 
    document.getElementById('userSection').style.display='block'; 
}

function renderAdminSessions() {
    const div = document.getElementById('edSessions'); div.innerHTML = "";
    (configData.sessions || []).forEach((s, i) => {
        div.innerHTML += `<div class="admin-row"><input type="text" id="sn${i}" value="${s.name}" style="flex:3"><input type="number" id="sc${i}" value="${s.cap}" style="flex:1"><button onclick="removeRow(${i})">X</button></div>`;
    });
}

function saveAdminSettings() {
    const sessionRows = (configData.sessions || []).map((_, i) => ({
        name: document.getElementById(`sn${i}`).value,
        cap: parseInt(document.getElementById(`sc${i}`).value)
    }));
    db.ref('master').update({
        title: document.getElementById('edTitle').value,
        desc: document.getElementById('edDesc').value,
        start: document.getElementById('edStart').value,
        end: document.getElementById('edEnd').value,
        sessions: sessionRows
    }).then(() => alert("설정이 저장되었습니다."));
}

function addSessionRow() { if(!configData.sessions) configData.sessions = []; configData.sessions.push({name:"", cap:20}); renderAdminSessions(); }
function removeRow(i) { configData.sessions.splice(i,1); renderAdminSessions(); }

function renderLogTable() {
    const body = document.getElementById('resTable'); body.innerHTML = "";
    Object.keys(reserveLogs).reverse().forEach(k => { 
        const r = reserveLogs[k]; 
        body.innerHTML += `<tr><td>${r.session}</td><td>${r.student}</td><td>${r.phone}</td><td>${r.attendee || '-'}</td><td><button onclick="delLog('${k}')">X</button></td></tr>`; 
    });
}

async function delLog(k) {
    if(confirm("삭제하시겠습니까? 정원이 1명 복구됩니다.")) {
        const log = reserveLogs[k];
        if (log && log.sessionIdx !== undefined) {
            await db.ref(`master/sessions/${log.sessionIdx}/cap`).transaction(c => (c || 0) + 1);
        }
        db.ref(`logs/${k}`).remove();
    }
}

function clearAllLogs() { if(confirm("명단을 전체 삭제하시겠습니까?")) db.ref('logs').remove(); }

function downloadExcel() {
    const data = Object.values(reserveLogs).map(r => ({"학생":r.student, "번호":r.phone, "참석자":r.attendee, "회차":r.session, "신청시간":r.date}));
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "명단");
    XLSX.writeFile(wb, "예약명단.xlsx");
}

function renderTemplateList(templates) {
    const select = document.getElementById('templateSelect');
    if(!select) return;
    select.innerHTML = '<option value="">-- 저장된 템플릿 선택 --</option>';
    Object.keys(templates).forEach(key => {
        const opt = document.createElement('option');
        opt.value = key;
        opt.innerText = templates[key].title;
        select.appendChild(opt);
    });
}

function loadTemplate(key) {
    if(!key || !configData.templates[key]) return;
    const item = configData.templates[key];
    document.getElementById('edTitle').value = item.title;
    document.getElementById('edDesc').value = item.desc;
}

function saveAsTemplate() {
    const title = document.getElementById('edTitle').value.trim();
    const desc = document.getElementById('edDesc').value.trim();
    if(!title || !desc) return alert("내용을 입력하세요.");
    db.ref('master/templates').push({ title, desc }).then(() => alert("템플릿 저장 완료"));
}

function deleteTemplate() {
    const key = document.getElementById('templateSelect').value;
    if(!key) return alert("선택된 템플릿이 없습니다.");
    db.ref(`master/templates/${key}`).remove();
}
</script>
</body>
</html>
